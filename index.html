<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zhiguli & Bulba 3D: True Pixel Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        
        /* ГЛАВНОЕ: Растягиваем маленькую картинку на весь экран без мыла */
        canvas { 
            display: block; 
            width: 100vw !important; 
            height: 100vh !important; 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
        }

        #ui { position: absolute; top: 10px; left: 10px; color: #ff0000; font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; pointer-events: none; }
        
        #message { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 24px; text-align: center; background: rgba(0,0,0,0.9); padding: 20px; border: 4px solid red; display: none; z-index: 20; }
        
        #restart-btn { margin-top: 20px; padding: 10px 25px; background: red; color: white; border: none; font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; cursor: pointer; display: none; pointer-events: auto; }

        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .btn { width: 70px; height: 70px; background: rgba(100, 100, 100, 0.4); border: 3px solid #555; border-radius: 10px; color: white; font-size: 24px; display: flex; justify-content: center; align-items: center; }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>

<div id="ui">
    HP: <span id="hp">100</span>% | БУЛЬБА: <span id="score">0</span> | ВРЕМЯ: <span id="time">300</span>
</div>

<div id="message">
    <div id="death-text">ЖИГУЛИ СГОРЕЛИ</div>
    <button id="restart-btn">РЕСТАРТ</button>
</div>

<div id="controls">
    <div style="display:flex; gap:15px;">
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-right">▶</div>
    </div>
    <div style="display:flex; gap:15px;">
        <div class="btn" id="btn-brake">▼</div>
        <div class="btn" id="btn-gas">▲</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- ПИКСЕЛЬНЫЕ ТЕКСТУРЫ (32x32) ---
    function createPixTex(draw) {
        const c = document.createElement('canvas');
        c.width = 32; c.height = 32;
        const ctx = c.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        draw(ctx);
        const t = new THREE.CanvasTexture(c);
        t.magFilter = THREE.NearestFilter;
        t.minFilter = THREE.NearestFilter;
        return t;
    }

    const texAsphalt = createPixTex(ctx => { ctx.fillStyle='#333'; ctx.fillRect(0,0,32,32); ctx.fillStyle='#444'; for(let i=0;i<20;i++) ctx.fillRect(Math.random()*32,Math.random()*32,2,2); });
    const texWall = createPixTex(ctx => { ctx.fillStyle='#555'; ctx.fillRect(0,0,32,32); ctx.fillStyle='#222'; ctx.fillRect(4,4,8,10); ctx.fillRect(20,4,8,10); });
    const texGopnik = createPixTex(ctx => { ctx.fillStyle='#111'; ctx.fillRect(8,12,16,15); ctx.fillStyle='#fdb813'; ctx.fillRect(12,4,8,8); });
    const texBulba = createPixTex(ctx => { ctx.fillStyle='#c19a6b'; ctx.beginPath(); ctx.ellipse(16,16,10,7,0,0,7); ctx.fill(); });
    const texGlass = createPixTex(ctx => { ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,32,32); ctx.fillStyle='#4e4e6a'; ctx.fillRect(2,2,28,6); }); // Стекла

    // --- МИР ---
    let gameActive = true, hp = 100, score = 0, timeRemaining = 300, velocity = 0, angle = 0;
    let enemies = [], items = [];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    scene.fog = new THREE.FogExp2(0x1a1a1a, 0.05);

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    // КЛЮЧ: рендерим в очень маленьком разрешении
    renderer.setSize(window.innerWidth / 4, window.innerHeight / 4, false);
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ map: texAsphalt }));
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    for (let i = 0; i < 50; i++) {
        const b = new THREE.Mesh(new THREE.BoxGeometry(4, 10, 4), new THREE.MeshBasicMaterial({ map: texWall }));
        b.position.set((Math.random()-0.5)*150, 5, (Math.random()-0.5)*150);
        if(b.position.length()>12) scene.add(b);
    }

    // ЖИГУЛИ 3D + СТЕКЛА
    const carGroup = new THREE.Group();
    const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 4), new THREE.MeshBasicMaterial({ color: 0x800000 }));
    carBody.position.y = 0.4;
    const carCabin = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.7, 2), new THREE.MeshBasicMaterial({ map: texGlass }));
    carCabin.position.set(0, 1.1, -0.2);
    carGroup.add(carBody); carGroup.add(carCabin);
    scene.add(carGroup);

    // --- ЛОГИКА ---
    const keys = { gas: 0, brake: 0, left: 0, right: 0 };
    const bind = (id, k) => {
        document.getElementById(id).ontouchstart = (e) => { e.preventDefault(); keys[k] = 1; };
        document.getElementById(id).ontouchend = (e) => { e.preventDefault(); keys[k] = 0; };
    };
    bind('btn-left','left'); bind('btn-right','right'); bind('btn-gas','gas'); bind('btn-brake','brake');

    function spawn() {
        enemies.forEach(e => scene.remove(e.spr)); enemies = [];
        items.forEach(i => scene.remove(i.spr)); items = [];
        for(let i=0; i<20; i++) {
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: texGopnik }));
            spr.position.set((Math.random()-0.5)*100, 1.2, (Math.random()-0.5)*100);
            spr.scale.set(1.5, 2.3, 1); scene.add(spr); enemies.push({spr});
        }
        for(let i=0; i<40; i++) {
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: texBulba }));
            spr.position.set((Math.random()-0.5)*120, 0.6, (Math.random()-0.5)*120);
            scene.add(spr); items.push({spr});
        }
    }

    function reset() {
        hp = 100; score = 0; timeRemaining = 300; velocity = 0; angle = 0;
        carGroup.position.set(0,0,0);
        document.getElementById('message').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'none';
        document.getElementById('hp').innerText = hp;
        document.getElementById('score').innerText = score;
        spawn(); gameActive = true;
    }

    document.getElementById('restart-btn').onclick = reset;

    setInterval(() => {
        if(gameActive) {
            timeRemaining--; document.getElementById('time').innerText = timeRemaining;
            if(hp <= 0) {
                gameActive = false;
                document.getElementById('message').style.display = 'block';
                document.getElementById('restart-btn').style.display = 'inline-block';
            }
        }
    }, 1000);

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        if(!gameActive) return;
        const dt = clock.getDelta();

        if(keys.gas) velocity -= 15 * dt;
        else if(keys.brake) velocity += 15 * dt;
        else velocity *= 0.96;
        velocity = Math.max(Math.min(velocity, 8), -18);

        if(Math.abs(velocity) > 0.5) {
            const t = (velocity < 0 ? 2 : -1.5) * dt;
            if(keys.left) angle += t; if(keys.right) angle -= t;
        }
        carGroup.rotation.y = angle;
        carGroup.position.x += Math.sin(angle) * velocity * dt;
        carGroup.position.z += Math.cos(angle) * velocity * dt;

        camera.position.copy(carGroup.position).add(new THREE.Vector3(0, 3, 7).applyAxisAngle(new THREE.Vector3(0,1,0), angle));
        camera.lookAt(carGroup.position);

        items.forEach(it => { if(carGroup.position.distanceTo(it.spr.position)<2.2) { 
            score++; document.getElementById('score').innerText = score;
            it.spr.position.set((Math.random()-0.5)*100, 0.6, (Math.random()-0.5)*100);
        }});
        
        enemies.forEach(en => {
            const d = carGroup.position.distanceTo(en.spr.position);
            if(d < 35) en.spr.position.addScaledVector(new THREE.Vector3().subVectors(carGroup.position, en.spr.position).normalize(), 2.5*dt);
            if(d < 2) { hp -= 25*dt; document.getElementById('hp').innerText = Math.floor(hp); }
        });

        renderer.render(scene, camera);
    }

    spawn();
    animate();
    window.onresize = () => { 
        renderer.setSize(window.innerWidth / 4, window.innerHeight / 4, false);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    };
</script>
</body>
</html>
